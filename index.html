<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --grad-a:#fde8f0;--grad-b:#e8e0ff;--grad-c:#d4f5eb;--grad-d:#fde8dc;
      --pink-d:#e891aa;--lavender:#c9b8f9;
      --text:#5a3d52;--text-lt:#9b7a8e;
      --ring1:#e891aa;--ring2:#c9b8f9;
      --btn-grad:linear-gradient(135deg,#e891aa,#c9b8f9);
      --shadow:0 8px 40px rgba(180,120,160,0.18);
      --card-bg:rgba(255,255,255,0.52);
      --panel-bg:rgba(255,255,255,0.45);
      --border:rgba(255,255,255,0.7);
      --input-bg:rgba(255,255,255,0.6);
    }
    [data-theme="ocean"] {
      --grad-a:#dff0ff;--grad-b:#d0e8f5;--grad-c:#c8f0f0;--grad-d:#d8e8ff;
      --pink-d:#5baad4;--lavender:#7ec8e3;--text:#1e3a52;--text-lt:#4a7a9b;
      --btn-grad:linear-gradient(135deg,#5baad4,#7ec8e3);
      --shadow:0 8px 40px rgba(60,130,180,0.18);
    }
    [data-theme="forest"] {
      --grad-a:#d8f0e0;--grad-b:#e0f0d0;--grad-c:#c8e8c0;--grad-d:#f0ead8;
      --pink-d:#5aaa6a;--lavender:#8acc88;--text:#1e3a28;--text-lt:#4a7a5a;
      --btn-grad:linear-gradient(135deg,#5aaa6a,#8acc88);
      --shadow:0 8px 40px rgba(60,140,80,0.18);
    }
    [data-theme="sunset"] {
      --grad-a:#ffe0c8;--grad-b:#ffc8b0;--grad-c:#ffd8b0;--grad-d:#ffeac8;
      --pink-d:#e8784a;--lavender:#f0a86a;--text:#52280a;--text-lt:#9b6040;
      --btn-grad:linear-gradient(135deg,#e8784a,#f0a86a);
      --shadow:0 8px 40px rgba(200,100,60,0.18);
    }
    [data-dark="1"] {
      --grad-a:#1a1025;--grad-b:#1a1530;--grad-c:#0f1a20;--grad-d:#201015;
      --card-bg:rgba(40,28,50,0.78);--panel-bg:rgba(40,28,50,0.65);
      --border:rgba(255,255,255,0.1);--input-bg:rgba(255,255,255,0.09);
      --text:#f0dff0;--text-lt:#b09ab8;--shadow:0 8px 40px rgba(0,0,0,0.45);
    }

    html,body{height:100%;font-family:'DM Sans',sans-serif;color:var(--text);overflow-x:hidden;}
    body{
      background:linear-gradient(135deg,var(--grad-a),var(--grad-b),var(--grad-c),var(--grad-d));
      background-size:400% 400%;
      animation:gradShift 14s ease infinite;
      min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:1.5rem;transition:color 0.5s;
    }
    @keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

    /* Zen */
    body.zen .card>*:not(.timer-ring-wrap):not(#motivation){ display:none!important; }
    body.zen .card{background:transparent;border:none;box-shadow:none;backdrop-filter:none;-webkit-backdrop-filter:none;}
    .zen-hint{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);font-size:0.72rem;color:var(--text-lt);opacity:0;transition:opacity 0.4s;pointer-events:none;z-index:100;white-space:nowrap;}
    body.zen .zen-hint{opacity:1;}

    /* Particles */
    .particles-layer{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .particle{position:absolute;opacity:0;animation:fall linear infinite;}
    .particle.petal{border-radius:80% 20% 80% 20% / 80% 20% 80% 20%;}
    .particle.bubble{border-radius:50%;border:2px solid currentColor;background:transparent!important;animation-name:rise!important;}
    @keyframes fall{0%{transform:translateY(-60px) rotate(0deg) scale(0.8);opacity:0}10%{opacity:.65}90%{opacity:.45}100%{transform:translateY(110vh) rotate(360deg) scale(1.1);opacity:0}}
    @keyframes rise{0%{transform:translateY(110vh) scale(0.6);opacity:0}10%{opacity:.5}90%{opacity:.3}100%{transform:translateY(-60px) scale(1.2);opacity:0}}

    /* Card */
    .card{
      position:relative;z-index:1;
      background:var(--card-bg);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
      border:1.5px solid var(--border);border-radius:32px;
      box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,0.45);
      padding:2rem 2rem 1.8rem;max-width:440px;width:100%;text-align:center;
      animation:cardIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
      transition:background 0.4s,border 0.4s,box-shadow 0.4s;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(0.94)}to{opacity:1;transform:translateY(0) scale(1)}}

    /* Top bar */
    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
    .app-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:600;display:flex;align-items:center;gap:8px;}
    .top-actions{display:flex;gap:0.4rem;}
    .icon-btn{
      background:var(--input-bg);border:none;cursor:pointer;width:34px;height:34px;
      border-radius:50%;font-size:0.9rem;display:flex;align-items:center;justify-content:center;
      transition:transform 0.15s,background 0.2s;color:var(--text);
    }
    .icon-btn:hover{transform:scale(1.1);background:rgba(255,255,255,0.82);}
    [data-dark="1"] .icon-btn:hover{background:rgba(255,255,255,0.15);}

    /* Bloom SVG flower */
    .bloom-flower{width:34px;height:34px;flex-shrink:0;cursor:pointer;}
    .bloom-flower-wrap{position:relative;display:inline-flex;align-items:center;}
    .bloom-tooltip{
      position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 6px);
      background:rgba(255,255,255,0.95);border:1px solid rgba(200,160,180,0.3);
      border-radius:12px;padding:6px 10px;font-size:.68rem;color:#5a3d52;
      white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.2s;
      box-shadow:0 4px 16px rgba(180,120,160,0.15);z-index:10;
    }
    [data-dark="1"] .bloom-tooltip{background:rgba(40,28,50,0.95);color:#f0dff0;}
    .bloom-flower-wrap:hover .bloom-tooltip{opacity:1;}
    .fpetal{transform-origin:17px 17px;transition:opacity 0.6s ease,transform 0.6s cubic-bezier(0.34,1.56,0.64,1);opacity:0;transform:scale(0.1);}
    .fpetal.shown{opacity:0.88 !important;transform:scale(1) !important;}
    @keyframes petalPulse{0%,100%{opacity:.88}50%{opacity:1;transform:scale(1.1)}}
    @keyframes petalBoom{0%{opacity:0;transform:scale(0.1)}60%{transform:scale(1.2)}100%{opacity:.88;transform:scale(1)}}
    .fpetal.petal-bloom-anim{animation:petalBoom 0.55s cubic-bezier(0.34,1.56,0.64,1) both;}

    /* Tabs */
    .tabs{display:flex;gap:0.35rem;background:rgba(255,255,255,0.32);border-radius:50px;padding:5px;margin-bottom:1.4rem;transition:background 0.4s;}
    .tab{flex:1;border:none;background:transparent;border-radius:50px;padding:.4rem .1rem;font-family:'DM Sans',sans-serif;font-size:.76rem;font-weight:500;color:var(--text-lt);cursor:pointer;transition:all 0.3s;}
    .tab.active{background:white;color:var(--text);box-shadow:0 2px 10px rgba(180,120,160,.2);}
    [data-dark="1"] .tab.active{background:rgba(255,255,255,.14);color:var(--text);}

    /* Ring — clickable */
    .timer-ring-wrap{position:relative;width:200px;height:200px;margin:0 auto 1.2rem;cursor:pointer;user-select:none;-webkit-user-select:none;}
    .timer-ring-wrap:hover .ring-progress{filter:drop-shadow(0 0 10px rgba(233,145,170,0.7));}
    .timer-ring-wrap svg{transform:rotate(-90deg);width:100%;height:100%;}
    .ring-bg{fill:none;stroke:rgba(200,200,220,0.32);stroke-width:10;}
    .ring-progress{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s linear,filter 0.2s;filter:drop-shadow(0 0 6px rgba(233,145,170,0.5));}
    .timer-face{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.1rem;}
    .timer-display{font-family:'Playfair Display',serif;font-size:3rem;font-weight:600;letter-spacing:-.03em;line-height:1;transition:transform 0.15s;}
    .timer-ring-wrap:hover .timer-display{transform:scale(1.03);}
    .timer-lbl{font-size:.7rem;color:var(--text-lt);letter-spacing:.1em;text-transform:uppercase;}
    .ring-hint{font-size:.62rem;color:var(--text-lt);opacity:0;transition:opacity 0.2s;margin-top:2px;}
    .timer-ring-wrap:hover .ring-hint{opacity:1;}

    /* Mode transition */
    .card.mode-switching{animation:modeSwitch 0.35s ease both;}
    @keyframes modeSwitch{0%{opacity:1;transform:scale(1)}40%{opacity:.6;transform:scale(0.97)}100%{opacity:1;transform:scale(1)}}

    /* Motivation */
    .motivation{font-family:'Playfair Display',serif;font-style:italic;font-size:.95rem;color:var(--text-lt);min-height:1.4em;margin-bottom:1.2rem;transition:opacity 0.4s;}

    /* Controls */
    .controls{display:flex;align-items:center;justify-content:center;gap:.8rem;margin-bottom:1.4rem;}
    .btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;border-radius:50px;transition:transform 0.15s,box-shadow 0.15s;}
    .btn:active{transform:scale(0.95)!important;}
    .btn-main{background:var(--btn-grad);color:white;font-size:.95rem;padding:.8rem 2.2rem;box-shadow:0 4px 20px rgba(232,145,170,.38);letter-spacing:.03em;transition:transform 0.15s,box-shadow 0.15s,background 0.5s;}
    .btn-main:hover{box-shadow:0 6px 26px rgba(232,145,170,.58);transform:translateY(-1px);}
    .btn-icon{background:var(--input-bg);color:var(--text);width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;box-shadow:0 2px 8px rgba(180,120,160,.12);}
    .btn-icon:hover{background:rgba(255,255,255,.82);transform:translateY(-1px);}
    [data-dark="1"] .btn-icon:hover{background:rgba(255,255,255,.15);}

    /* Sessions */
    .session-counter{display:flex;align-items:center;justify-content:center;gap:.5rem;font-size:.82rem;color:var(--text-lt);margin-bottom:1rem;}
    .tomatoes{display:flex;gap:4px;}
    .tomato-dot{width:11px;height:11px;border-radius:50%;background:rgba(200,160,180,.25);border:1.5px solid rgba(200,160,180,.35);transition:background 0.4s,transform 0.3s;}
    .tomato-dot.done{background:var(--pink-d);border-color:var(--pink-d);transform:scale(1.18);}

    /* History button */
    .history-btn{font-size:.72rem;color:var(--text-lt);background:var(--input-bg);border:none;border-radius:50px;padding:.3rem .8rem;cursor:pointer;margin-bottom:1.2rem;transition:background 0.2s;}
    .history-btn:hover{background:rgba(255,255,255,.82);}

    /* Settings overlay */
    .settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.22);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;}
    .settings-overlay.open{opacity:1;pointer-events:auto;}
    .settings-panel{
      position:fixed;top:0;right:0;height:100%;width:320px;max-width:92vw;
      background:var(--card-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border-left:1.5px solid var(--border);
      box-shadow:-8px 0 40px rgba(0,0,0,0.15);
      z-index:201;display:flex;flex-direction:column;
      transform:translateX(110%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1),background 0.4s;
      overflow-y:auto;
    }
    .settings-panel.open{transform:translateX(0);}
    .settings-panel-inner{display:flex;flex-direction:column;gap:1rem;padding:1.4rem;flex:1;text-align:left;}
    .settings-header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.4rem 0.8rem;border-bottom:1px solid var(--border);}
    .settings-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;color:var(--text);}
    .settings-close{background:var(--input-bg);border:none;cursor:pointer;width:32px;height:32px;border-radius:50%;font-size:1rem;display:flex;align-items:center;justify-content:center;color:var(--text);transition:transform 0.15s;}
    .settings-close:hover{transform:scale(1.1);}
    .setting-group label.group-label{font-size:.72rem;font-weight:500;color:var(--text-lt);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:.4rem;}

    /* Sliders */
    .duration-row{display:flex;align-items:center;gap:.6rem;}
    .duration-row span{font-size:.82rem;color:var(--text);min-width:46px;text-align:right;font-weight:500;}
    input[type=range]{flex:1;-webkit-appearance:none;height:4px;border-radius:4px;background:linear-gradient(to right,var(--pink-d) 0%,var(--pink-d) var(--pct,50%),rgba(200,180,200,.3) var(--pct,50%));outline:none;cursor:pointer;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--pink-d);box-shadow:0 2px 6px rgba(0,0,0,.15);}

    /* Pills */
    .pill-row{display:flex;gap:.4rem;flex-wrap:wrap;}
    .pill{border:2px solid transparent;border-radius:50px;padding:.3rem .75rem;font-size:.74rem;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;background:var(--input-bg);color:var(--text);}
    .pill.active{border-color:var(--pink-d);box-shadow:0 2px 8px rgba(0,0,0,.12);}
    .pill[data-t="bloom"]{background:#f9b8c9;color:#5a3d52;}
    .pill[data-t="ocean"]{background:#b8ddf9;color:#1e3a52;}
    .pill[data-t="forest"]{background:#b8f9c8;color:#1e3a28;}
    .pill[data-t="sunset"]{background:#f9d4b8;color:#52280a;}

    /* Toggle */
    .toggle-row{display:flex;align-items:center;gap:.6rem;}
    .toggle{position:relative;width:38px;height:22px;flex-shrink:0;}
    .toggle input{opacity:0;width:0;height:0;}
    .toggle-slider{position:absolute;inset:0;background:rgba(200,180,200,.4);border-radius:22px;cursor:pointer;transition:background 0.3s;}
    .toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:transform 0.3s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
    .toggle input:checked+.toggle-slider{background:var(--pink-d);}
    .toggle input:checked+.toggle-slider::before{transform:translateX(16px);}
    .toggle-lbl{font-size:.78rem;color:var(--text);}

    /* History panel */
    .history-panel{
      position:fixed;top:0;left:0;height:100%;width:340px;max-width:92vw;
      background:var(--card-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border-right:1.5px solid var(--border);
      box-shadow:8px 0 40px rgba(0,0,0,0.15);
      z-index:201;display:flex;flex-direction:column;
      transform:translateX(-110%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
      overflow-y:auto;
    }
    .history-panel.open{transform:translateX(0);}
    .history-header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.4rem 0.8rem;border-bottom:1px solid var(--border);}
    .history-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;color:var(--text);}
    .history-body{padding:1.2rem 1.4rem;display:flex;flex-direction:column;gap:1rem;}
    .stat-card{background:var(--input-bg);border-radius:16px;padding:1rem 1.2rem;}
    .stat-label{font-size:.7rem;color:var(--text-lt);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;}
    .stat-value{font-family:'Playfair Display',serif;font-size:2rem;font-weight:600;color:var(--text);}
    .stat-sub{font-size:.72rem;color:var(--text-lt);margin-top:.2rem;}
    .history-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:.5rem;}
    .day-dot{width:100%;aspect-ratio:1;border-radius:4px;background:rgba(200,160,180,.2);position:relative;}
    .day-dot.has-sessions{background:var(--pink-d);opacity:0.7;}
    .day-dot.has-sessions.today{opacity:1;box-shadow:0 0 6px rgba(233,145,170,0.5);}
    .day-dot-label{font-size:.55rem;color:var(--text-lt);text-align:center;margin-top:2px;}
    .week-grid{display:flex;flex-direction:column;gap:2px;}
    .streak-row{display:flex;align-items:center;gap:.5rem;font-size:.82rem;color:var(--text);}
    .streak-fire{font-size:1.1rem;}

    /* Favicon canvas (hidden) */
    #faviconCanvas{display:none;}

    @media(max-width:480px){
      .card{padding:1.6rem 1.3rem 1.4rem;}
      .timer-ring-wrap{width:175px;height:175px;}
      .timer-display{font-size:2.6rem;}
    }
  </style>
</head>
<body>

  <canvas id="faviconCanvas" width="32" height="32"></canvas>
  <div class="particles-layer" id="particles"></div>
  <div class="zen-hint">Press Esc or tap the card to exit zen mode</div>

  <div class="card" id="card">
    <div class="top-bar">
      <div class="app-title">
        <!-- Interactive Bloom Flower -->
        <div class="bloom-flower-wrap" id="flowerWrap">
          <svg class="bloom-flower" id="flowerSvg" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 6 petals — rotation via transform attr, visibility via style -->
            <ellipse id="p0" cx="17" cy="9" rx="4" ry="7" fill="#e891aa" transform="rotate(0   17 17)" style="opacity:0;transition:opacity 0.5s ease"/>
            <ellipse id="p1" cx="17" cy="9" rx="4" ry="7" fill="#c9b8f9" transform="rotate(60  17 17)" style="opacity:0;transition:opacity 0.5s ease 0.08s"/>
            <ellipse id="p2" cx="17" cy="9" rx="4" ry="7" fill="#e891aa" transform="rotate(120 17 17)" style="opacity:0;transition:opacity 0.5s ease 0.16s"/>
            <ellipse id="p3" cx="17" cy="9" rx="4" ry="7" fill="#c9b8f9" transform="rotate(180 17 17)" style="opacity:0;transition:opacity 0.5s ease 0.24s"/>
            <ellipse id="p4" cx="17" cy="9" rx="4" ry="7" fill="#e891aa" transform="rotate(240 17 17)" style="opacity:0;transition:opacity 0.5s ease 0.32s"/>
            <ellipse id="p5" cx="17" cy="9" rx="4" ry="7" fill="#c9b8f9" transform="rotate(300 17 17)" style="opacity:0;transition:opacity 0.5s ease 0.40s"/>
            <!-- Center always visible -->
            <circle cx="17" cy="17" r="5" fill="white" opacity=".95"/>
            <circle id="flowerCenterDot" cx="17" cy="17" r="2.5" fill="#e891aa" opacity=".7"/>
          </svg>
          <div class="bloom-tooltip" id="flowerTooltip">0 pomodoros today</div>
        </div>
        Bloom
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="zenBtn" title="Zen mode">🧘</button>
        <button class="icon-btn" id="notifBtn" title="Enable notifications">🔔</button>
        <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
      </div>
    </div>

    <div class="tabs" role="tablist">
      <button class="tab active" data-mode="work"  onclick="switchMode('work')">Focus</button>
      <button class="tab"        data-mode="short" onclick="switchMode('short')">Short break</button>
      <button class="tab"        data-mode="long"  onclick="switchMode('long')">Long break</button>
    </div>

    <!-- Ring — click to start/pause -->
    <div class="timer-ring-wrap" id="ringWrap" onclick="toggleTimer()" title="Click to start / pause">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle class="ring-bg" cx="100" cy="100" r="86" />
        <circle class="ring-progress" id="ring" cx="100" cy="100" r="86"
          stroke="url(#grad)" stroke-dasharray="540.35" stroke-dashoffset="0" />
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop id="g1" offset="0%"   stop-color="#e891aa" />
            <stop id="g2" offset="100%" stop-color="#c9b8f9" />
          </linearGradient>
        </defs>
      </svg>
      <div class="timer-face">
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="timer-lbl"     id="timerLbl">focus</div>
        <div class="ring-hint"     id="ringHint">tap to start</div>
      </div>
    </div>

    <div class="motivation" id="motivation">You've got this, gorgeous ✨</div>

    <div class="controls">
      <button class="btn btn-icon" onclick="resetTimer()" title="Reset">↺</button>
      <button class="btn btn-main" id="startBtn" onclick="toggleTimer()">Start</button>
      <button class="btn btn-icon" onclick="skipSession()" title="Skip">⏭</button>
    </div>

    <div class="session-counter">
      <div class="tomatoes" id="tomatoes"></div>
      <span id="sessionText">0 / 4 sessions</span>
    </div>

    <button class="history-btn" onclick="openHistory()">📊 View history</button>
  </div>

  <!-- History panel -->
  <div class="settings-overlay" id="historyOverlay" onclick="closeHistory()"></div>
  <div class="history-panel" id="historyPanel">
    <div class="history-header">
      <span class="history-title">📊 Your history</span>
      <button class="settings-close" onclick="closeHistory()">✕</button>
    </div>
    <div class="history-body" id="historyBody"></div>
  </div>

  <!-- Settings overlay -->
  <div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()"></div>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <span class="settings-title">⚙️ Settings</span>
      <button class="settings-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="settings-panel-inner">
      <div class="setting-group">
        <label class="group-label">Focus duration</label>
        <div class="duration-row">
          <input type="range" id="focusSlider" min="5" max="60" value="25" step="1" />
          <span id="focusVal">25 min</span>
        </div>
      </div>
      <div class="setting-group">
        <label class="group-label">Short break</label>
        <div class="duration-row">
          <input type="range" id="shortSlider" min="1" max="15" value="5" step="1" />
          <span id="shortVal">5 min</span>
        </div>
      </div>
      <div class="setting-group">
        <label class="group-label">Long break</label>
        <div class="duration-row">
          <input type="range" id="longSlider" min="5" max="30" value="15" step="1" />
          <span id="longVal">15 min</span>
        </div>
      </div>
      <div class="setting-group">
        <label class="group-label">Theme</label>
        <div class="pill-row">
          <button class="pill active" data-t="bloom"  onclick="setTheme('bloom')">🌸 Bloom</button>
          <button class="pill"        data-t="ocean"  onclick="setTheme('ocean')">🌊 Ocean</button>
          <button class="pill"        data-t="forest" onclick="setTheme('forest')">🌿 Forest</button>
          <button class="pill"        data-t="sunset" onclick="setTheme('sunset')">🌅 Sunset</button>
        </div>
      </div>
      <div class="setting-group">
        <label class="group-label">Notification sound</label>
        <div class="pill-row">
          <button class="pill active" data-s="chime"   onclick="setSound('chime')">🔔 Chime</button>
          <button class="pill"        data-s="bell"    onclick="setSound('bell')">🛎 Bell</button>
          <button class="pill"        data-s="tibetan" onclick="setSound('tibetan')">🎵 Tibetan</button>
          <button class="pill"        data-s="none"    onclick="setSound('none')">🔇 None</button>
        </div>
      </div>
      <div class="setting-group">
        <label class="group-label">Tick sound during focus</label>
        <div class="toggle-row">
          <label class="toggle">
            <input type="checkbox" id="tickToggle" onchange="onTickToggle(this.checked)" />
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-lbl">Subtle tick every second</span>
        </div>
      </div>
      <div class="setting-group">
        <label class="group-label">Dark mode</label>
        <div class="toggle-row">
          <label class="toggle">
            <input type="checkbox" id="darkToggle" onchange="onDarkToggle(this.checked)" />
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-lbl" id="darkLbl">Auto (follows time of day)</span>
        </div>
      </div>
      <div class="setting-group" style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border);">
        <button onclick="resetHistory()" style="font-size:.72rem;color:var(--text-lt);background:none;border:none;cursor:pointer;text-decoration:underline;">Reset all history & preferences</button>
      </div>
    </div>
  </div>

  <script>
  // ── Constants ──
  const CIRC = 2 * Math.PI * 86;
  const THEME_GRADS = {
    bloom:  { work:['#e891aa','#c9b8f9'], short:['#82d9be','#b8f0e0'], long:['#a08adc','#fad4b2'] },
    ocean:  { work:['#5baad4','#7ec8e3'], short:['#3a9ac0','#5baad4'], long:['#2a7aaa','#3a9ac0'] },
    forest: { work:['#5aaa6a','#8acc88'], short:['#6acc8a','#a0e0a0'], long:['#3a8a4a','#5aaa6a'] },
    sunset: { work:['#e8784a','#f0a86a'], short:['#f0a86a','#f8cc8a'], long:['#c85830','#e8784a'] },
  };
  const QUOTES = {
    work:  ["You've got this, gorgeous ✨","Deep focus, deep beauty 🌷","One step at a time, bloom 🌸","You're doing amazing, truly 💖","Channel your inner magic ✨","Breathe in, focus out 🌬️"],
    short: ["Take a gentle breath 🌿","Stretch those lovely shoulders 🤍","Hydrate, you deserve it 💧","A little pause, a big reset 🌸"],
    long:  ["You've earned this rest, queen 👑","Breathe deeply, float freely 🌙","This break is self-care 🫧","Rest is productive too 🌼"],
  };
  const MODE_LABEL = { work:'focus', short:'short break', long:'long break' };
  const LS_KEY = 'bloom_prefs_v2';
  const LS_HIST = 'bloom_history_v1';

  // ── State ──
  let durations  = { work:25*60, short:5*60, long:15*60 };
  let mode       = 'work';
  let total      = durations.work;
  let remaining  = total;
  let running    = false;
  let ivId       = null;
  let sessions   = 0;
  let qIdx       = 0;
  let sound      = 'chime';
  let theme      = 'bloom';
  let darkManual = false;
  let zenMode    = false;
  let tickEnabled= false;
  let tickCtx    = null;

  // ── localStorage helpers ──
  function savePrefs() {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        durations, sound, theme, darkManual,
        dark: document.body.getAttribute('data-dark') === '1',
        tickEnabled,
        focusMin: durations.work/60, shortMin: durations.short/60, longMin: durations.long/60,
      }));
    } catch(e){}
  }

  function loadPrefs() {
    try {
      const p = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      if (p.focusMin) {
        durations.work  = p.focusMin * 60;
        durations.short = p.shortMin * 60;
        durations.long  = p.longMin  * 60;
        document.getElementById('focusSlider').value = p.focusMin;
        document.getElementById('shortSlider').value = p.shortMin;
        document.getElementById('longSlider').value  = p.longMin;
        document.getElementById('focusVal').textContent = p.focusMin + ' min';
        document.getElementById('shortVal').textContent = p.shortMin + ' min';
        document.getElementById('longVal').textContent  = p.longMin  + ' min';
      }
      if (p.sound)  { sound = p.sound; document.querySelectorAll('[data-s]').forEach(x => x.classList.toggle('active', x.dataset.s === sound)); }
      if (p.theme)  setTheme(p.theme);
      if (p.tickEnabled) { tickEnabled = true; document.getElementById('tickToggle').checked = true; }
      if (p.darkManual) { darkManual = true; applyDark(p.dark); document.getElementById('darkLbl').textContent = p.dark ? 'Dark' : 'Light'; }
    } catch(e){}
    total = durations[mode]; remaining = total;
  }

  // ── History ──
  function getHistory() {
    try { return JSON.parse(localStorage.getItem(LS_HIST) || '{}'); } catch(e) { return {}; }
  }
  function saveHistory(h) {
    try { localStorage.setItem(LS_HIST, JSON.stringify(h)); } catch(e){}
  }
  function getTodaySessions() {
    try {
      const h = getHistory();
      const today = new Date().toISOString().slice(0,10);
      return h[today] || 0;
    } catch(e) { return 0; }
  }

  // todaySessionsCount tracks sessions in memory as fallback when localStorage unavailable
  let todaySessionsCount = 0;

  function updateFlower(animated) {
    const stored = getTodaySessions();
    const count = Math.max(stored, todaySessionsCount);
    const msgs = ['0 pomodoros — let\'s start! 🌱','1 petal — blooming 🌸','2 petals 🌸','3 petals ✨','4 petals 💖','5 petals 🌺','Full bloom! 🌸✨'];
    const tooltip = document.getElementById('flowerTooltip');
    if (tooltip) tooltip.textContent = msgs[Math.min(count, msgs.length-1)];

    for (let i = 0; i < 6; i++) {
      const p = document.getElementById('p' + i);
      if (!p) continue;
      if (i < count) {
        // Show with staggered delay on animation
        const delay = animated ? (i === count - 1 ? 0 : 0) : 0;
        setTimeout(() => { p.style.opacity = '0.88'; }, delay);
        // Pulse center on new petal
        if (animated && i === count - 1) {
          const dot = document.getElementById('flowerCenterDot');
          if (dot) {
            dot.setAttribute('r', '4');
            setTimeout(() => dot.setAttribute('r', '2.5'), 350);
          }
        }
      } else {
        p.style.opacity = '0';
      }
    }
  }

  function recordSession() {
    todaySessionsCount++;
    try {
      const h = getHistory();
      const today = new Date().toISOString().slice(0,10);
      h[today] = (h[today] || 0) + 1;
      saveHistory(h);
    } catch(e) {}
    updateFlower(true);
  }
  function resetHistory() {
    if (!confirm('Reset all history and preferences?')) return;
    localStorage.removeItem(LS_KEY);
    localStorage.removeItem(LS_HIST);
    location.reload();
  }

  function openHistory() {
    const h = getHistory();
    const body = document.getElementById('historyBody');
    const days = Object.keys(h).sort();
    const today = new Date().toISOString().slice(0,10);

    // Stats
    const total_sessions = Object.values(h).reduce((a,b) => a+b, 0);
    const thisWeek = (() => {
      const now = new Date();
      let count = 0;
      for (let i=0;i<7;i++) {
        const d = new Date(now); d.setDate(d.getDate()-i);
        const k = d.toISOString().slice(0,10);
        count += h[k] || 0;
      }
      return count;
    })();
    const thisMonth = (() => {
      const prefix = today.slice(0,7);
      return Object.entries(h).filter(([k]) => k.startsWith(prefix)).reduce((a,[,v])=>a+v,0);
    })();

    // Streak
    let streak = 0;
    const checkDate = new Date();
    while(true) {
      const k = checkDate.toISOString().slice(0,10);
      if (h[k]) { streak++; checkDate.setDate(checkDate.getDate()-1); }
      else break;
    }

    // Last 28 days grid
    const gridDays = [];
    for(let i=27;i>=0;i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const k = d.toISOString().slice(0,10);
      gridDays.push({ key:k, count:h[k]||0, isToday: k===today, label: d.toLocaleDateString('en',{weekday:'short'}).slice(0,1) });
    }

    body.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;">
        <div class="stat-card">
          <div class="stat-label">This week</div>
          <div class="stat-value">${thisWeek}</div>
          <div class="stat-sub">pomodoros</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">This month</div>
          <div class="stat-value">${thisMonth}</div>
          <div class="stat-sub">pomodoros</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">All time</div>
        <div class="stat-value">${total_sessions}</div>
        <div class="stat-sub">total pomodoros completed</div>
      </div>
      <div class="stat-card">
        <div class="streak-row"><span class="streak-fire">🔥</span> <strong>${streak} day${streak!==1?'s':''}</strong> current streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Last 28 days</div>
        <div class="history-days" style="margin-top:.6rem;">
          ${gridDays.map(d => `
            <div>
              <div class="day-dot ${d.count?'has-sessions':''} ${d.isToday?'today':''}" title="${d.key}: ${d.count} session${d.count!==1?'s':''}"></div>
              <div class="day-dot-label">${d.label}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;

    document.getElementById('historyPanel').classList.add('open');
    document.getElementById('historyOverlay').classList.add('open');
  }
  function closeHistory() {
    document.getElementById('historyPanel').classList.remove('open');
    document.getElementById('historyOverlay').classList.remove('open');
  }

  // ── Audio: notifications ──
  function playNotes(freqs, type, vol, decay) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      freqs.forEach((f, i) => {
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type=type; o.frequency.value=f;
        const t=ctx.currentTime+i*0.28;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(vol, t+0.06);
        g.gain.exponentialRampToValueAtTime(0.001, t+decay);
        o.start(t); o.stop(t+decay+0.1);
      });
    } catch(e){}
  }
  const SOUNDS = {
    chime:   () => playNotes([523.25,659.25,783.99,1046.5],'sine',0.22,0.6),
    bell:    () => playNotes([880,1108,1318],'triangle',0.18,1.0),
    tibetan: () => playNotes([220,329.6,440],'sine',0.25,1.4),
    none:    () => {},
  };

  // ── Tick sound ──
  function playTick() {
    if (!tickEnabled) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.value = 800;
      g.gain.setValueAtTime(0.04, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.07);
    } catch(e){}
  }
  function onTickToggle(checked) {
    tickEnabled = checked;
    savePrefs();
  }

  // ── Dynamic favicon ──
  function updateFavicon() {
    try {
      const canvas = document.getElementById('faviconCanvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0,0,32,32);
      // Background circle
      ctx.beginPath(); ctx.arc(16,16,15,0,Math.PI*2);
      ctx.fillStyle = running ? '#e891aa' : '#c9b8f9';
      ctx.fill();
      // Progress arc
      const pct = remaining / total;
      ctx.beginPath();
      ctx.arc(16,16,12,-Math.PI/2,-Math.PI/2 + (1-pct)*Math.PI*2);
      ctx.strokeStyle = 'white'; ctx.lineWidth = 3; ctx.lineCap = 'round';
      ctx.stroke();
      // Update favicon
      let link = document.querySelector("link[rel~='icon']");
      if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
      link.href = canvas.toDataURL();
    } catch(e){}
  }

  // ── Particles ──
  function spawnParticles(particleMode) {
    const layer = document.getElementById('particles');
    layer.innerHTML = '';
    const isBubble = particleMode === 'bubble';
    const colors = isBubble ? ['#b8ddf9','#b8f9e8','#d8b8f9'] : ['#f9b8c9','#c9b8f9','#b8f0e0','#fad4b2','#e8c6f5'];
    for (let i = 0; i < (isBubble ? 18 : 22); i++) {
      const p = document.createElement('div');
      p.className = 'particle ' + (isBubble ? 'bubble' : 'petal');
      const s = isBubble ? (14+Math.random()*28) : (12+Math.random()*14);
      const c = colors[Math.floor(Math.random()*colors.length)];
      p.style.cssText = `left:${Math.random()*100}vw;width:${s}px;height:${s}px;color:${c};background:${isBubble?'transparent':c};animation-duration:${7+Math.random()*11}s;animation-delay:${Math.random()*13}s;opacity:0;${isBubble?'border-color:'+c+';':''}`;
      layer.appendChild(p);
    }
  }
  spawnParticles('petal');

  // ── Slider fill ──
  function fillSlider(el) {
    const pct = ((+el.value - +el.min) / (+el.max - +el.min) * 100).toFixed(1) + '%';
    el.style.setProperty('--pct', pct);
  }
  ['focusSlider','shortSlider','longSlider'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input', () => { fillSlider(el); savePrefs(); });
    fillSlider(el);
  });

  document.getElementById('focusSlider').addEventListener('input', function(){
    document.getElementById('focusVal').textContent = this.value + ' min';
    durations.work = this.value * 60;
    if (mode==='work') { total=durations.work; remaining=total; render(); }
  });
  document.getElementById('shortSlider').addEventListener('input', function(){
    document.getElementById('shortVal').textContent = this.value + ' min';
    durations.short = this.value * 60;
    if (mode==='short') { total=durations.short; remaining=total; render(); }
  });
  document.getElementById('longSlider').addEventListener('input', function(){
    document.getElementById('longVal').textContent = this.value + ' min';
    durations.long = this.value * 60;
    if (mode==='long') { total=durations.long; remaining=total; render(); }
  });

  // ── Theme ──
  function setTheme(t) {
    theme = t;
    document.body.setAttribute('data-theme', t === 'bloom' ? '' : t);
    document.querySelectorAll('[data-t]').forEach(p => p.classList.toggle('active', p.dataset.t === t));
    updateGrad(mode);
    savePrefs();
  }

  // ── Sound ──
  function setSound(s) {
    sound = s;
    document.querySelectorAll('[data-s]').forEach(p => p.classList.toggle('active', p.dataset.s === s));
    if (s !== 'none') SOUNDS[s]();
    savePrefs();
  }

  // ── Dark mode ──
  function applyDark(on) {
    document.body.setAttribute('data-dark', on ? '1' : '0');
    document.getElementById('darkToggle').checked = on;
  }
  function onDarkToggle(checked) {
    darkManual = true;
    document.getElementById('darkLbl').textContent = checked ? 'Dark' : 'Light';
    applyDark(checked);
    savePrefs();
  }
  function autoDark() {
    if (darkManual) return;
    const h = new Date().getHours();
    applyDark(h >= 21 || h < 7);
  }
  autoDark();
  setInterval(autoDark, 60000);

  // ── Zen ──
  document.getElementById('zenBtn').addEventListener('click', () => { zenMode=true; document.body.classList.add('zen'); });
  document.addEventListener('keydown', e => { if (e.key==='Escape') { if(zenMode) exitZen(); closeSettings(); closeHistory(); }});
  document.getElementById('card').addEventListener('click', e => {
    if (zenMode && (e.target.id==='card'||e.target.classList.contains('timer-display')||e.target.classList.contains('timer-lbl')||e.target.classList.contains('timer-face'))) exitZen();
  });
  function exitZen() { zenMode=false; document.body.classList.remove('zen'); }

  // ── Notifications ──
  let notifOk = false;
  const notifBtn = document.getElementById('notifBtn');
  function updateNotifBtn() {
    if (!('Notification' in window)) { notifBtn.textContent = '🔕'; return; }
    if (Notification.permission === 'granted') { notifOk = true; notifBtn.textContent = '🔔'; notifBtn.title = 'Notifications enabled'; }
    else if (Notification.permission === 'denied') { notifOk = false; notifBtn.textContent = '🔕'; notifBtn.title = 'Notifications blocked — change in browser settings'; }
    else { notifOk = false; notifBtn.textContent = '🔔'; notifBtn.title = 'Enable notifications'; }
  }
  notifBtn.addEventListener('click', async () => {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'denied') {
      alert('Notifications are blocked. Please allow them in your browser settings and reload.');
      return;
    }
    await Notification.requestPermission();
    updateNotifBtn();
  });
  updateNotifBtn();
  function pushNotif(title, body) {
    if (notifOk && document.hidden) new Notification(title, { body });
  }

  // ── Settings ──
  function openSettings() {
    document.getElementById('settingsPanel').classList.add('open');
    document.getElementById('settingsOverlay').classList.add('open');
  }
  function closeSettings() {
    document.getElementById('settingsPanel').classList.remove('open');
    document.getElementById('settingsOverlay').classList.remove('open');
  }
  document.getElementById('settingsBtn').addEventListener('click', openSettings);

  // ── Swipe support ──
  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
  document.addEventListener('touchend', e => {
    if (zenMode) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) < 60) return;
    const modes = ['work','short','long'];
    const idx = modes.indexOf(mode);
    if (dx < 0 && idx < modes.length-1) switchMode(modes[idx+1]);
    if (dx > 0 && idx > 0) switchMode(modes[idx-1]);
  }, {passive:true});

  // ── Render ──
  function fmt(s) { return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

  function updateGrad(m) {
    const g = (THEME_GRADS[theme]||THEME_GRADS.bloom)[m];
    document.getElementById('g1').setAttribute('stop-color', g[0]);
    document.getElementById('g2').setAttribute('stop-color', g[1]);
  }

  function render() {
    const t = fmt(remaining);
    document.getElementById('timerDisplay').textContent = t;
    document.getElementById('timerLbl').textContent = MODE_LABEL[mode];
    document.title = running ? t + ' | Bloom 🌸' : 'Bloom 🌸';
    document.getElementById('ring').style.strokeDashoffset = CIRC * (1 - remaining / total);
    document.getElementById('ringHint').textContent = running ? 'tap to pause' : 'tap to start';
    updateFavicon();
  }

  function showQuote() {
    const pool = QUOTES[mode];
    const el = document.getElementById('motivation');
    el.style.opacity = 0;
    setTimeout(() => { el.textContent = pool[qIdx % pool.length]; el.style.opacity = 1; qIdx++; }, 350);
  }

  function updateDots() {
    const d = document.getElementById('tomatoes');
    d.innerHTML = '';
    for (let i=0;i<4;i++){const dot=document.createElement('div');dot.className='tomato-dot'+(i<sessions%4?' done':'');d.appendChild(dot);}
    document.getElementById('sessionText').textContent = sessions + ' / 4 sessions';
  }

  // ── Timer ──
  function tick() {
    if (remaining <= 0) {
      clearInterval(ivId); running=false;
      document.getElementById('startBtn').textContent = 'Start';
      SOUNDS[sound]();
      if (mode === 'work') {
        sessions++;
        recordSession();
        updateDots();
        pushNotif('Focus done! 🌸', "Time for a break 👑");
        switchMode(sessions % 4 === 0 ? 'long' : 'short');
      } else {
        pushNotif('Break over! ✨', "Back to it 🌷");
        switchMode('work');
      }
      return;
    }
    if (mode === 'work') playTick();
    remaining--;
    render();
  }

  function toggleTimer() {
    if (running) {
      clearInterval(ivId); running=false;
      document.getElementById('startBtn').textContent = 'Resume';
    } else {
      ivId = setInterval(tick, 1000); running=true;
      document.getElementById('startBtn').textContent = 'Pause';
      showQuote();
    }
    render();
  }

  function resetTimer() {
    clearInterval(ivId); running=false;
    document.getElementById('startBtn').textContent = 'Start';
    remaining = total; render();
  }

  function skipSession() { clearInterval(ivId); running=false; remaining=0; tick(); }

  function switchMode(m) {
    clearInterval(ivId); running=false;
    document.getElementById('startBtn').textContent = 'Start';
    mode=m; total=durations[m]; remaining=total;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode===m));
    updateGrad(m);
    spawnParticles(m === 'work' ? 'petal' : 'bubble');
    // Mode transition animation
    const card = document.getElementById('card');
    card.classList.remove('mode-switching');
    void card.offsetWidth;
    card.classList.add('mode-switching');
    setTimeout(() => card.classList.remove('mode-switching'), 400);
    render(); showQuote(); updateDots();
  }

  // ── Boot ──
  loadPrefs();
  render(); updateDots(); showQuote(); updateGrad('work');
  todaySessionsCount = getTodaySessions();
  updateFlower(false);
  </script>
